    clusterUid: "b41fcd9e-697f-59e1-9652-ecd34ddb39b2"
    clusterId: "t-static-001-8k2p"
    provider: talos
    environment: test
    datacenter: no-centraltest-az1
    project: static-ip-project
    region: centraltest
    workorder: "static-workorder"
    zone: "az1"
    #country: no
    workspace: "static-workspace"
