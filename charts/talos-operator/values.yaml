# Default values for talos-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/vitistack/viti-talos-operator
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# Talos Operator Configuration
# Endpoint mode determines how the operator configures control plane endpoints.
# Valid values:
# - "none": Use control plane IPs directly (no load balancing)
# - "networkconfiguration": Use ControlPlaneVirtualSharedIP from NetworkNamespace (default)
# - "talosvip": Use Talos built-in VIP (requires additional Talos configuration)
# - "custom": Use user-provided endpoint addresses
endpointMode: "networkconfiguration"

# Maximum number of KubernetesCluster reconciliations running in parallel
# (env var MAX_CONCURRENT_RECONCILES). The workqueue serializes by object key,
# so this only parallelizes across distinct objects. Defaults to 5.
maxConcurrentReconciles: 5

# Custom endpoint addresses (only used when endpointMode is "custom")
# Can be a single IP/hostname or comma-separated list
customEndpoint: ""

# Boot image source configuration
# Valid values: "pxe", "bootimage"
# Default: "pxe" (uses PXE boot for machine provisioning)
bootImageSource: "bootimage"

# Boot image URL (only used when bootImageSource is "bootimage")
bootImage: "https://factory.talos.dev/image/b0f2a8b575460a3dcb1234cc081c73c88e795aaef36eda9b88a6f4dddbd49365/v1.13.5/nocloud-amd64.iso"

# Log configuration
logLevel: "info"
logJson: true

# Secret prefix for cluster secrets
secretPrefix: ""

# Vitistack name
vitistackName: "vitistack"

# Kubernetes provider name
kubernetesProviderName: "talos-provider"

# Tenant configuration
tenant:
  configMapName: "talos-tenant-config"
  configMapNamespace: "default"
  configMapDataKey: "config.yaml"

# Talos configuration
talos:
  version: "v1.13.5"
  defaultKubernetesVersion: "1.36.2"
  predictableNetworkNames: true
  vmInstallImage:
    kubevirt: "factory.talos.dev/nocloud-installer/b0f2a8b575460a3dcb1234cc081c73c88e795aaef36eda9b88a6f4dddbd49365:v1.13.5"
    default: "factory.talos.dev/nocloud-installer/b0f2a8b575460a3dcb1234cc081c73c88e795aaef36eda9b88a6f4dddbd49365:v1.13.5"
  # Talos system extensions every node must have. The operator queries each
  # reachable node and triggers a Talos upgrade with vmInstallImage.<provider>
  # (or vmInstallImage.default as fallback) when one of these is missing — the
  # schematic baked into that image MUST contain these extensions, so keep
  # this list and the image's schematic in sync.
  # Empty list disables the check.
  requiredExtensions:
    - siderolabs/iscsi-tools
    - siderolabs/qemu-guest-agent
    - siderolabs/trident-iscsi-tools
    - siderolabs/util-linux-tools
  # Extension reconciliation reinstalls a node from vmInstallImage.<provider>,
  # which ALSO moves it to that image's Talos version — so it can upgrade
  # clusters fleet-wide whenever the image tag differs from the running version.
  # Disabled by default so it never auto-upgrades datacenters that have not
  # opted in; while false no node is touched even if requiredExtensions are
  # listed/missing. Enable per environment to enforce extensions, ideally with
  # vmInstallImage tagged at the cluster's current Talos version.
  extensionEnforceEnabled: false
  # Minutes between Talos upgrade triggers on the same node + image. Must be
  # long enough to cover a Talos reboot + extension unpack + API recovery; once
  # the window elapses with extensions still missing, the operator re-triggers.
  extensionCooldownMinutes: 5
  # Talos version enforcement reconciler: probes each node's running Talos
  # version via the Talos API and, if a node disagrees with the cluster's
  # per-cluster upgrade.vitistack.io/talos-target annotation, triggers
  # `talosctl upgrade` (CPs first, then workers, one per pass). Never
  # downgrades. The desired version comes from the per-cluster annotation,
  # never a global default. Disabled by default — upgrades are driven by the
  # annotation-driven flow; enable only as an opt-in drift-recovery backstop.
  versionEnforceEnabled: false
  # Minutes between version-enforcement Talos upgrade triggers on the same
  # node + target version + image. Without this throttle the 5s reconcile
  # loop would re-issue the upgrade RPC every pass while the node is still
  # rebooting/draining. Must cover Talos reboot + cordon/drain + API
  # recovery; once it elapses with the node still on the wrong version the
  # operator re-triggers (likely the previous upgrade failed). Min: 1.
  versionEnforceCooldownMinutes: 5

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  fsGroup: 2000
  runAsUser: 1000
  runAsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 9993

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 2000m
    memory: 512Mi
  requests:
    cpu: 500m
    memory: 256Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /healthz
    port: 9993
readinessProbe:
  httpGet:
    path: /readyz
    port: 9993

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
# Note: Operators typically run as single instances with leader election enabled
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Extra environment variables to add to the container
# Example:
# extraEnv:
#   - name: MY_VAR
#     value: "my-value"
extraEnv: []

# Environment variables from Secrets or ConfigMaps
# Use this for sensitive data - reference existing secrets/configmaps
# Example:
# envFrom:
#   - secretRef:
#       name: my-secret
#   - configMapRef:
#       name: my-configmap
envFrom: []
